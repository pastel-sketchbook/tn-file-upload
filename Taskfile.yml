version: "3"

vars:
  CARGO_TARGET_DIR: "{{.USER_WORKING_DIR}}/target"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ── Quality ────────────────────────────────────────────────

  fmt:
    desc: Format code with rustfmt
    cmds:
      - cargo fmt

  fmt:check:
    desc: Check formatting without modifying files
    cmds:
      - cargo fmt -- --check

  lint:
    desc: Run clippy with pedantic warnings as errors
    cmds:
      - cargo clippy -- -D warnings -W clippy::pedantic

  test:
    desc: Run all tests
    cmds:
      - cargo test

  test:verbose:
    desc: Run tests with stdout visible
    cmds:
      - cargo test -- --nocapture

  check:
    desc: Quick type-check without codegen
    cmds:
      - cargo check

  check:all:
    desc: Format, lint, and test in one shot
    cmds:
      - task: fmt
      - task: lint
      - task: test

  # ── Build ──────────────────────────────────────────────────

  build:
    desc: Build debug binary (formats and lints first)
    deps: [fmt, lint]
    cmds:
      - cargo build

  build:release:
    desc: Build release binary (formats and lints first)
    deps: [fmt, lint]
    cmds:
      - cargo build --release

  # ── Run ────────────────────────────────────────────────────

  run:server:
    desc: Start the gRPC server (release)
    cmds:
      - cargo run --release --bin file-upload-server

  run:client:
    desc: Run the gRPC client (release)
    cmds:
      - cargo run --release --bin file-upload-client

  run:server:debug:
    desc: Start the gRPC server (debug)
    cmds:
      - cargo run --bin file-upload-server

  run:client:debug:
    desc: Run the gRPC client (debug)
    cmds:
      - cargo run --bin file-upload-client

  # ── Bench & Metrics ────────────────────────────────────────

  bench:
    desc: Run criterion benchmarks
    cmds:
      - cargo bench

  loc:
    desc: Count lines of code with tokei
    cmds:
      - tokei

  # ── Docs ───────────────────────────────────────────────────

  doc:
    desc: Generate and open rustdoc
    cmds:
      - cargo doc --no-deps --open

  # ── Dependencies ───────────────────────────────────────────

  update:
    desc: Update Cargo.lock to latest compatible versions
    cmds:
      - cargo update

  outdated:
    desc: List outdated dependencies (requires cargo-outdated)
    cmds:
      - cargo outdated

  audit:
    desc: Check for known vulnerabilities (requires cargo-audit)
    cmds:
      - cargo audit

  # ── Workflows ──────────────────────────────────────────────

  pre:commit:
    desc: Pre-commit gate — format, lint, test
    deps: [fmt, lint, test]

  ci:
    desc: CI pipeline — format check, lint, test, build
    cmds:
      - task: fmt:check
      - task: lint
      - task: test
      - task: build

  tdd:
    desc: Watch mode — re-run tests on save (requires cargo-watch)
    cmds:
      - cargo watch -x test

  dev:
    desc: Start both Rust server and Vite SPA dev server
    deps: [build]
    cmds:
      - |
        cleanup() { kill $SERVER_PID $VITE_PID 2>/dev/null; }
        trap cleanup EXIT

        # Kill any stale processes on these ports
        lsof -ti :3001 | xargs kill -9 2>/dev/null || true
        lsof -ti :50051 | xargs kill -9 2>/dev/null || true
        lsof -ti :3000 | xargs kill -9 2>/dev/null || true
        sleep 1

        AUTH_TOKEN="${AUTH_TOKEN:-dev-token}" ./target/debug/file-upload-server &
        SERVER_PID=$!

        # Wait for REST port to be ready
        for i in 1 2 3 4 5; do
          curl -s -o /dev/null http://[::1]:3001/api/files && break
          sleep 1
        done

        cd web && bun run dev &
        VITE_PID=$!
        sleep 1

        echo ""
        echo "=== Dev servers running ==="
        echo "  REST API: http://[::1]:3001"
        echo "  gRPC:     [::1]:50051"
        echo "  SPA:      http://localhost:3000"
        echo ""
        echo "Press Ctrl+C to stop all"
        wait

  dev:smoke:
    desc: Smoke test all upload functions (starts server, tests, stops)
    cmds:
      - ./scripts/smoke-test.sh {{.CLI_ARGS}}

  dev:watch:
    desc: Watch mode — rebuild and run server on save (requires cargo-watch)
    cmds:
      - cargo watch -x "run --release --bin file-upload-server"

  # ── Housekeeping ───────────────────────────────────────────

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean

  install:tools:
    desc: Install optional dev tools
    cmds:
      - cargo install cargo-watch cargo-outdated cargo-audit tokei

  # ── Versioning ──────────────────────────────────────────────

  version:
    desc: Show current version
    cmds:
      - ./scripts/version.sh show

  version:patch:
    desc: Bump patch version (0.1.0 → 0.1.1)
    cmds:
      - ./scripts/version.sh patch

  version:minor:
    desc: Bump minor version (0.1.0 → 0.2.0)
    cmds:
      - ./scripts/version.sh minor

  version:major:
    desc: Bump major version (0.1.0 → 1.0.0)
    cmds:
      - ./scripts/version.sh major

  version:tag:
    desc: Create a git tag for the current VERSION
    cmds:
      - ./scripts/version.sh tag
